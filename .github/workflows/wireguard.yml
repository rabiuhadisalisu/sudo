name: Wireguard Server

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  booting:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v2

    - name: Setting Up User
      run: bash sudo user.sh

    - name: Update and Upgrade Packages
      run: bash sudo update.sh

    - name: Firewall Tocking
      run: bash sudo firewall.sh

    - name: Configuring BinD
      run: bash sudo bind9.sh

    - name: Configuring npm
      run: bash sudo npmtunnel.sh

    - name: Update and Upgrade Packages
      run: bash sudo wireguard.sh

    #- name: Installing Desktop GNOME
      #run: bash desktop.sh

    #- name: Installing XRDP
      #run: bash xrdp.sh

    - name: Hosting TunnelD
      run: bash sudo tund.sh

    - name: Noping ngrok
      run: bash sudo wgngrok.sh

